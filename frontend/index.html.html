<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Scanner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            width: 420px;
            margin: 100px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Resume Scanner</h1>
    <h2>Upload Resume & Select Role</h2>

    <!-- File Upload -->
    <input type="file" id="fileInput" accept=".pdf,.docx" />

    <!-- 🔥 Role Selection (NEW) -->
    <select id="role">
        <option value="cloud_engineer">Cloud Engineer</option>
        <option value="python_developer">Python Developer</option>
        <option value="data_scientist">Data Scientist</option>
    </select>

    <button onclick="uploadResume()">Upload Resume</button>

    <p id="status"></p>
</div>

<script>
async function uploadResume() {
    const fileInput = document.getElementById("fileInput");
    const role = document.getElementById("role").value;
    const status = document.getElementById("status");

    if (!fileInput.files.length) {
        status.innerText = "Please select a resume file.";
        return;
    }

    const file = fileInput.files[0];

    if (file.size > 2 * 1024 * 1024) {
        status.innerText = "File size must be under 2 MB";
        return;
    }

    status.innerText = "Getting upload URL...";

    try {
        // ✅ Step 1: Get pre-signed URL
        const response = await fetch(
            "https://yp3mzw5rlh.execute-api.ap-south-1.amazonaws.com/dev/generate-upload-url",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    filename: file.name,
                    role: role   // 🔥 send role
                })
            }
        );

        if (!response.ok) {
            throw new Error("Failed to get upload URL");
        }

        const data = await response.json();

        if (!data.upload_url) {
            throw new Error("Upload URL not returned from backend");
        }

        const uploadUrl = data.upload_url;

        status.innerText = "Uploading file...";

        // ✅ Step 2: Upload to S3 WITH metadata
        const uploadResponse = await fetch(uploadUrl, {
            method: "PUT",
            headers: {
                "x-amz-meta-role": role   // 🔥 VERY IMPORTANT
            },
            body: file
        });

        if (!uploadResponse.ok) {
            throw new Error("S3 upload failed");
        }

        status.innerText = "Resume uploaded & processing started!";

    } catch (error) {
        console.error("Upload error:", error);
        status.innerText = " Error occurred during upload.";
    }
}
</script>

</body>
</html>
